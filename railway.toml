[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
# Start command comes from Dockerfile CMD (sh -c expands $PORT).
# Do not set startCommand here — Railway runs it without a shell, so
# `${PORT:-8000}` would be passed literally to uvicorn.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
